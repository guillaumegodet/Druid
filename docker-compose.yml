services:
  druid:
    build:
      context: .
      args:
        VITE_GRIST_DOC_ID: ${VITE_GRIST_DOC_ID}
        VITE_GRIST_RESEARCHERS_TABLE: ${VITE_GRIST_RESEARCHERS_TABLE:-Annuaire}
        VITE_GRIST_STRUCTURES_TABLE: ${VITE_GRIST_STRUCTURES_TABLE:-Structures}
    ports:
      - "${DRUID_PORT:-3000}:3000"
    environment:
      - DRUID_PORT=3000
      - APP_URL=${APP_URL:-http://localhost:3000}
      - DRUID_AUTH_ENABLED=${DRUID_AUTH_ENABLED:-false}
      - SESSION_SECRET=${SESSION_SECRET}
      # Keycloak — required only when DRUID_AUTH_ENABLED=true
      - KEYCLOAK_URL=${KEYCLOAK_URL:-}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-druid}
      # Grist write-back (optional — read-only without it)
      - VITE_GRIST_API_KEY=${VITE_GRIST_API_KEY:-}
      # LDAP sync (optional)
      - LDAP_URL=${LDAP_URL:-}
      - LDAP_BIND_DN=${LDAP_BIND_DN:-}
      - LDAP_BIND_PW=${LDAP_BIND_PW:-}
      - LDAP_BASE_DN=${LDAP_BASE_DN:-}
      - LDAP_FILTER=${LDAP_FILTER:-}
    restart: unless-stopped
